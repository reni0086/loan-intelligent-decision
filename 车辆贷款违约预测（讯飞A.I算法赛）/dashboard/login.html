<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - 贷款客户信息修复与智能决策系统</title>
  <link rel="stylesheet" href="/dashboard/css/main.css" />
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
    }

    .login-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 36px;
    }

    .login-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1f2d3d;
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 14px;
      color: #6b7785;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1f2d3d;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e4e8;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
    }

    .form-input-icon {
      position: relative;
    }

    .form-input-icon .form-input {
      padding-left: 42px;
    }

    .form-input-icon::before {
      content: '';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      background-size: contain;
    }

    .icon-user::before { content: '\1F464'; }
    .icon-lock::before { content: '\1F512'; }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(26,115,232,0.4);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .login-error {
      background: #fce8e6;
      border: 1px solid #f28b82;
      border-radius: 8px;
      padding: 12px 16px;
      color: #c5221f;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .login-error.show {
      display: block;
    }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #6b7785;
    }

    .demo-hint {
      background: #e8f0fe;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 16px;
      font-size: 12px;
      color: #1a73e8;
    }

    .demo-hint strong {
      display: block;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">&#x1F3E6;</div>
        <h1 class="login-title">贷款客户信息修复与智能决策系统</h1>
        <p class="login-subtitle">请输入账号密码登录</p>
      </div>

      <div class="login-error" id="loginError"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <div class="form-input-icon icon-user">
            <input type="text" class="form-input" id="username" name="username" placeholder="请输入用户名" required autocomplete="username" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <div class="form-input-icon icon-lock">
            <input type="password" class="form-input" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password" />
          </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">登 录</button>
      </form>

      <div class="demo-hint">
        <strong>&#x21385; 演示账号</strong>
        用户名: <code>admin</code> &nbsp; 密码: <code>admin123</code>
      </div>

      <div class="login-footer">
        <p>贷款客户信息修复与智能决策系统 v2.0</p>
      </div>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const loginBtn = document.getElementById('loginBtn');

    // 检查是否已登录
    function checkAuth() {
      const token = localStorage.getItem('auth_token');
      const user = localStorage.getItem('auth_user');
      if (token && user) {
        // 已登录，跳转到首页
        window.location.href = '/dashboard/index.html';
      }
    }

    checkAuth();

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.classList.remove('show');
      loginBtn.disabled = true;
      loginBtn.textContent = '登录中...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // 保存登录信息
          localStorage.setItem('auth_token', data.token || 'logged_in');
          localStorage.setItem('auth_user', JSON.stringify({
            username: data.username,
            role: data.role,
            user_id: data.user_id
          }));
          // 跳转到首页
          window.location.href = '/dashboard/index.html';
        } else {
          loginError.textContent = data.message || '用户名或密码错误';
          loginError.classList.add('show');
          loginBtn.disabled = false;
          loginBtn.textContent = '登 录';
        }
      } catch (error) {
        loginError.textContent = '网络错误，请稍后重试';
        loginError.classList.add('show');
        loginBtn.disabled = false;
        loginBtn.textContent = '登 录';
      }
    });
  </script>
</body>
</html>
