# ============================================================
#  Flume Agent Configuration — 贷款客户信息修复与智能决策系统
# ============================================================
# 功能：
#   1. SpoolDir Source → HDFS Sink（CSV 文件自动采集到 HDFS /data_lake/raw/）
#   2. SpoolDir Source → Kafka Sink（CSV 事件实时推送到 Kafka lending_application topic）
#
# 启动方式：
#   /opt/flume/bin/flume-ng agent \
#       -n loan-agent \
#       -c /opt/flume/conf \
#       -f /opt/flume/conf/flume-agent.conf &
#
# 监控指标：
#   curl http://localhost:41414/metrics
# ============================================================

# ---------- 全局配置 ----------
loan-agent.sources  = spool-source kafka-source
loan-agent.channels = hdfs-channel kafka-channel
loan-agent.sinks    = hdfs-sink kafka-sink

loan-agent.channels.hdfs-channel.type  = memory
loan-agent.channels.hdfs-channel.capacity      = 100000
loan-agent.channels.hdfs-channel.transactionCapacity = 10000

loan-agent.channels.kafka-channel.type  = memory
loan-agent.channels.kafka-channel.capacity      = 100000
loan-agent.channels.kafka-channel.transactionCapacity = 10000

# ---------- Source 1: SpoolDir（CSV → HDFS） ----------
loan-agent.sources.spool-source.type              = spooldir
loan-agent.sources.spool-source.spoolDir         = /data/flume/spool
loan-agent.sources.spool-source.fileHeader        = false
loan-agent.sources.spool-source.deletePolicy      = never
loan-agent.sources.spool-source.interceptors      = ts-interceptor
loan-agent.sources.spool-source.batchSize         = 5000

# 时间戳拦截器（注入 flume_ts 元字段）
loan-agent.sources.spool-source.interceptors.ts-interceptor.type           = org.apache.flume.interceptor.TimestampInterceptor$Builder
loan-agent.sources.spool-source.interceptors.ts-interceptor.preserveExisting = false

loan-agent.sources.spool-source.channels = hdfs-channel

# ---------- Source 2: SpoolDir（CSV → Kafka） ----------
loan-agent.sources.kafka-source.type              = spooldir
loan-agent.sources.kafka-source.spoolDir         = /data/flume/spool
loan-agent.sources.kafka-source.fileHeader        = false
loan-agent.sources.kafka-source.deletePolicy      = never
loan-agent.sources.kafka-source.batchSize         = 1000
loan-agent.sources.kafka-source.channels = kafka-channel

# ---------- Sink 1: HDFS ----------
loan-agent.sinks.hdfs-sink.type           = hdfs
loan-agent.sinks.hdfs-sink.hdfs.uri       = hdfs://localhost:9000
loan-agent.sinks.hdfs-sink.hdfs.path      = /data_lake/raw/dt=%Y%m%d
loan-agent.sinks.hdfs-sink.hdfs.filePrefix  = loan_raw_
loan-agent.sinks.hdfs-sink.hdfs.fileSuffix  = .parquet
loan-agent.sinks.hdfs-sink.hdfs.fileType    = DataStream
loan-agent.sinks.hdfs-sink.hdfs.writeFormat = Text
loan-agent.sinks.hdfs-sink.hdfs.batchSize   = 10000
loan-agent.sinks.hdfs-sink.hdfs.rollInterval = 300
loan-agent.sinks.hdfs-sink.hdfs.rollSize     = 134217728
loan-agent.sinks.hdfs-sink.hdfs.rollCount    = 0
loan-agent.sinks.hdfs-sink.hdfs.idleTimeout  = 60
loan-agent.sinks.hdfs-sink.hdfs.maxOpenFds   = 50
loan-agent.sinks.hdfs-sink.hdfs.callTimeout  = 20000
loan-agent.sinks.hdfs-sink.hdfs.closeTries    = 3
loan-agent.sinks.hdfs-sink.hdfs.retryInterval = 180
loan-agent.sinks.hdfs-sink.hdfs.serializer    = TEXT
loan-agent.sinks.hdfs-sink.hdfs.serializer.columns = +body
loan-agent.sinks.hdfs-sink.channel      = hdfs-channel

# ---------- Sink 2: Kafka ----------
loan-agent.sinks.kafka-sink.type             = org.apache.flume.sink.kafka.KafkaSink
loan-agent.sinks.kafka-sink.kafka.bootstrap.servers = localhost:9092
loan-agent.sinks.kafka-sink.kafka.topic      = lending_application
loan-agent.sinks.kafka-sink.kafka.producer.acks             = 1
loan-agent.sinks.kafka-sink.kafka.producer.batch.size        = 16384
loan-agent.sinks.kafka-sink.kafka.producer.linger.ms         = 5
loan-agent.sinks.kafka-sink.kafka.producer.compression.type  = snappy
loan-agent.sinks.kafka-sink.flumeEventHeader = true
loan-agent.sinks.kafka-sink.channel = kafka-channel

# ---------- channel 到 sink 的绑定 ----------
loan-agent.sources.spool-source.channels = hdfs-channel
loan-agent.sinks.hdfs-sink.channel       = hdfs-channel

loan-agent.sources.kafka-source.channels = kafka-channel
loan-agent.sinks.kafka-sink.channel      = kafka-channel
